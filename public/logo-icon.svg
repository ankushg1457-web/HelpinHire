<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .icon-navy { fill: #0B1F3B; }
      .icon-action { fill: #F97316; }
    </style>
  </defs>
  
  <!-- Background gradient effect -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B1F3B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0B1F3B;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="200" fill="url(#bgGradient)"/>
  
  <!-- Left professional profile (white) -->
  <circle cx="70" cy="55" r="12" fill="white"/>
  <path d="M 65 72 Q 65 68 70 68 Q 75 68 75 72 L 75 90 Q 75 95 70 95 Q 65 95 65 90 Z" fill="white"/>
  
  <!-- Right professional profile (orange) -->
  <circle cx="130" cy="55" r="12" class="icon-action"/>
  <path d="M 125 72 Q 125 68 130 68 Q 135 68 135 72 L 135 90 Q 135 95 130 95 Q 125 95 125 90 Z" class="icon-action"/>
  
  <!-- Connection lines -->
  <path d="M 82 90 L 118 90" stroke="white" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Handshake/connection curve -->
  <path d="M 82 105 Q 100 125 118 105" stroke="#F97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Growth arrow (white) -->
  <g fill="white">
    <path d="M 85 130 L 100 115 L 115 130" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="100" y1="115" x2="100" y2="145" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>