<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .logo-navy { fill: #0B1F3B; }
      .logo-action { fill: #F97316; }
    </style>
  </defs>
  
  <!-- Background circle (subtle) -->
  <circle cx="100" cy="100" r="95" fill="#F3F5F8" stroke="#0B1F3B" stroke-width="2"/>
  
  <!-- Left professional profile (navy) -->
  <circle cx="70" cy="55" r="12" class="logo-navy"/>
  <path d="M 65 72 Q 65 68 70 68 Q 75 68 75 72 L 75 90 Q 75 95 70 95 Q 65 95 65 90 Z" class="logo-navy"/>
  
  <!-- Right professional profile (orange) -->
  <circle cx="130" cy="55" r="12" class="logo-action"/>
  <path d="M 125 72 Q 125 68 130 68 Q 135 68 135 72 L 135 90 Q 135 95 130 95 Q 125 95 125 90 Z" class="logo-action"/>
  
  <!-- Connection lines (representing network/hiring) -->
  <path d="M 82 90 L 118 90" stroke="#0B1F3B" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Handshake/connection curve (central element) -->
  <path d="M 82 105 Q 100 125 118 105" stroke="#F97316" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Bottom element representing growth/upward movement -->
  <g class="logo-navy">
    <path d="M 85 130 L 100 115 L 115 130" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="100" y1="115" x2="100" y2="145" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>